name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: schema + build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # `astro build` runs Zod schema validation, the cross-reference check
      # (alternatives.replaces -> tools), and emits the static site.
      - run: npm run build

  links:
    name: link check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run check:links
